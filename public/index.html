<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>murmur · 低语</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mammoth@1.9.0/mammoth.browser.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
<style>
/* fonts moved to non-blocking <link> in <head> */
:root{
  --bg:#0d0d0d;
  --bg2:#131313;
  --bg3:#1a1a1a;
  --line:rgba(255,255,255,0.08);
  --line2:rgba(255,255,255,0.12);
  --ink:#f5f0eb;
  --ink2:rgba(245,240,235,0.72);
  --ink3:rgba(245,240,235,0.42);
  --ink4:rgba(245,240,235,0.22);
  --o:#FF6A00;
  --ol:#FF8C33;
  --op:rgba(255,106,0,0.12);
  --p:#A78BFA;
  --pl:rgba(167,139,250,0.15);
  --gn:#4ADE80;
  --rd:#F87171;
  --yl:#FBBF24;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
body{position:relative;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 900px 520px at 50% -10%,rgba(255,106,0,0.13),transparent 60%),
             radial-gradient(ellipse 600px 400px at 85% 20%,rgba(167,139,250,0.06),transparent 55%);
}
.page{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 32px 120px;}

/* ===== HERO ===== */
.hero{padding:88px 0 48px;text-align:center;position:relative;}
.hero .logo{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:116px;font-weight:300;font-style:italic;
  letter-spacing:-2px;line-height:0.9;
  background:linear-gradient(180deg,#fff 0%,#f5f0eb 40%,#c9b89a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 60px rgba(255,106,0,0.08);
  margin-bottom:14px;
}
.hero .tagline{
  font-size:12px;letter-spacing:5px;text-transform:uppercase;
  color:var(--ink3);font-weight:300;margin-bottom:40px;
}
.hero .tagline b{color:var(--o);font-weight:400;font-style:italic;text-transform:none;letter-spacing:1px;font-family:'Cormorant Garamond',serif;font-size:15px;margin-right:8px;}

/* Ask Murmur box */
.ask-box{
  max-width:640px;margin:0 auto 36px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--line2);
  border-radius:100px;padding:6px 8px 6px 22px;
  transition:all 0.25s ease;backdrop-filter:blur(8px);
}
.ask-box:focus-within{border-color:var(--o);box-shadow:0 8px 30px rgba(255,106,0,0.15),0 0 0 3px rgba(255,106,0,0.08);background:rgba(255,255,255,0.06);}
.ask-box .ask-ic{color:var(--o);font-size:16px;flex-shrink:0;}
.ask-box input{
  flex:1;background:transparent;border:none;outline:none;color:var(--ink);
  font-size:14px;font-family:inherit;padding:12px 4px;
}
.ask-box input::placeholder{color:var(--ink3);font-size:13px;}
.ask-btn{
  width:42px;height:42px;border-radius:100px;border:none;cursor:pointer;
  background:var(--o);color:#fff;font-size:16px;flex-shrink:0;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.ask-btn:hover{background:#ff7a1a;transform:scale(1.05);}
.ask-btn:disabled{background:var(--ink3);cursor:not-allowed;transform:none;}

/* Ask answer panel */
.ask-panel{
  max-width:920px;margin:0 auto 40px;padding:28px 36px;
  background:linear-gradient(180deg,rgba(255,106,0,0.04),rgba(255,255,255,0.02));
  border:1px solid var(--line2);border-radius:16px;
  animation:askSlide 0.35s cubic-bezier(0.22,1,0.36,1);
}
@keyframes askSlide{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.ask-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line);}
.ask-q-row{display:flex;gap:12px;align-items:flex-start;flex:1;}
.ask-q-label{font-size:10px;font-weight:600;color:var(--o);background:rgba(255,106,0,0.12);padding:4px 10px;border-radius:4px;letter-spacing:1px;flex-shrink:0;margin-top:2px;}
.ask-q{font-size:16px;line-height:1.6;color:var(--ink);font-weight:500;}
.ask-close{background:none;border:none;color:var(--ink3);font-size:16px;cursor:pointer;padding:6px 10px;border-radius:6px;transition:all 0.15s;flex-shrink:0;}
.ask-close:hover{background:rgba(255,255,255,0.06);color:var(--ink);}
.ask-status{font-size:13px;color:var(--ink3);font-style:italic;padding:8px 0;display:flex;align-items:center;gap:10px;}
.ask-status:empty{display:none;}
.ask-status::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--o);animation:pulse 1.2s infinite;}
.ask-status.err::before{background:#f87171;animation:none;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
.ask-answer{font-size:14px;line-height:1.85;color:var(--ink);}
.ask-answer h1,.ask-answer h2,.ask-answer h3{color:var(--ink);margin-top:20px;margin-bottom:10px;}
.ask-answer h2{font-size:17px;padding-bottom:6px;border-bottom:1px solid var(--line);}
.ask-answer h3{font-size:15px;}
.ask-answer p{margin:10px 0;}
.ask-answer ul,.ask-answer ol{padding-left:24px;margin:10px 0;}
.ask-answer li{margin:4px 0;}
.ask-answer blockquote{border-left:3px solid var(--o);padding:4px 14px;margin:12px 0;color:var(--ink2);background:rgba(255,106,0,0.04);}
.ask-answer code{background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px;font-size:12px;}
.ask-answer strong{color:var(--ink);}
.cit-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,106,0,0.14);color:var(--o);
  padding:1px 7px;border-radius:4px;font-size:11px;font-weight:500;
  cursor:pointer;margin:0 2px;vertical-align:1px;
  border:1px solid rgba(255,106,0,0.25);transition:all 0.15s;
  text-decoration:none;
}
.cit-chip:hover{background:rgba(255,106,0,0.28);transform:translateY(-1px);}
.cit-chip.cit-note{background:rgba(167,139,250,0.14);color:var(--p);border-color:rgba(167,139,250,0.25);}
.cit-chip.cit-note:hover{background:rgba(167,139,250,0.28);}
.ask-cits{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);}
.ask-cits:empty{display:none;}
.ask-cits h4{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.cit-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;margin:6px 0;
  background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:8px;
  cursor:pointer;transition:all 0.15s;
}
.cit-item:hover{background:rgba(255,255,255,0.06);border-color:var(--o);transform:translateX(4px);}
.cit-title{flex:1;font-size:13px;color:var(--ink);font-weight:500;}
.cit-pod{font-size:11px;color:var(--ink3);padding:2px 8px;background:rgba(255,255,255,0.04);border-radius:4px;}

.pills{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.pill{
  display:inline-flex;align-items:center;gap:10px;
  padding:13px 22px;border-radius:100px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line2);
  color:var(--ink);font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(8px);
}
.pill:hover{
  background:rgba(255,255,255,0.06);
  border-color:var(--o);
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(255,106,0,0.12);
}
.pill .pill-ic{font-size:15px;}
.pill .pill-ct{
  margin-left:4px;font-size:10px;font-weight:700;
  background:var(--o);color:#fff;padding:2px 7px;border-radius:8px;min-width:18px;text-align:center;
}
.pill.pill-lark:hover{border-color:var(--p);box-shadow:0 10px 30px rgba(167,139,250,0.15);}
.pill.pill-glimpse:hover{border-color:var(--yl);box-shadow:0 10px 30px rgba(251,191,36,0.18);}

/* Comments panel inside drawer */
.comments-panel{margin-top:32px;padding-top:24px;border-top:1px solid var(--line);}
.comments-panel h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--yl);margin-bottom:14px;font-weight:600;font-family:'Inter',sans-serif;font-style:normal;}
.cmt-item{padding:12px 14px;background:rgba(251,191,36,0.05);border-left:2px solid var(--yl);border-radius:0 9px 9px 0;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.cmt-item:hover{background:rgba(251,191,36,0.1);}
.cmt-item .cmt-q{font-size:10px;color:var(--ink3);font-style:italic;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cmt-item .cmt-q::before{content:'「';}
.cmt-item .cmt-q::after{content:'」';}
.cmt-item .cmt-t{font-size:13px;color:var(--ink);line-height:1.7;}
.cmt-item .cmt-t:empty::before{content:'(无内容)';color:var(--ink4);}

/* Glimpse timeline */
.glimpse-nav{position:sticky;top:-26px;background:rgba(19,19,19,0.95);backdrop-filter:blur(8px);margin:-26px -32px 20px;padding:14px 32px;border-bottom:1px solid var(--line);z-index:5;overflow-x:auto;white-space:nowrap;}
.glimpse-nav a{display:inline-block;font-size:11px;padding:6px 13px;margin-right:6px;border:1px solid var(--line2);border-radius:100px;color:var(--ink2);cursor:pointer;transition:all 0.15s;font-family:'JetBrains Mono',monospace;}
.glimpse-nav a:hover{color:var(--yl);border-color:var(--yl);}
.glimpse-month{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--yl);margin:36px 0 18px;border-bottom:1px solid rgba(251,191,36,0.2);padding-bottom:10px;display:flex;align-items:baseline;gap:10px;}
.glimpse-month .count{font-size:11px;color:var(--ink3);font-family:'Inter',sans-serif;font-style:normal;letter-spacing:1px;text-transform:uppercase;}
.glimpse-entry{margin-bottom:26px;padding:20px 22px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-left:3px solid rgba(251,191,36,0.4);border-radius:0 12px 12px 0;transition:border-left-color 0.2s;}
.glimpse-entry.today{border-left-color:var(--yl);background:rgba(251,191,36,0.04);}
.glimpse-entry:hover{border-left-color:var(--yl);}
.glimpse-hdr{display:flex;align-items:center;margin-bottom:14px;}
.glimpse-date{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--yl);letter-spacing:0.5px;}
.glimpse-date .today-tag{margin-left:10px;font-size:10px;background:var(--yl);color:var(--bg);padding:2px 8px;border-radius:100px;font-weight:700;}
.glimpse-tools{margin-left:auto;display:flex;gap:4px;}
.glimpse-tools .icon-btn{font-size:12px;padding:4px 8px;}
.glimpse-body{font-size:13.5px;line-height:1.85;color:var(--ink2);}
.glimpse-body h1,.glimpse-body h2{display:none;}  /* the date is the header */
.glimpse-body h3{font-size:14px;color:var(--ink);margin:14px 0 6px;}
.glimpse-body p{margin-bottom:10px;}
.glimpse-body[contenteditable="true"]{outline:none;border:1px dashed var(--yl);border-radius:8px;padding:12px;background:rgba(251,191,36,0.04);min-height:60px;}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;justify-content:center;
  padding:20px 0 4px;margin-top:8px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,13,0.85);backdrop-filter:blur(12px);
}
.tab{
  padding:12px 22px;background:none;border:none;
  color:var(--ink3);font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:400;font-style:italic;letter-spacing:0.5px;
  cursor:pointer;transition:all 0.2s;position:relative;
}
.tab:hover{color:var(--ink);}
.tab.act{color:var(--o);}
.tab.act::after{
  content:'';position:absolute;left:22px;right:22px;bottom:-1px;height:2px;
  background:linear-gradient(90deg,transparent,var(--o),transparent);
}
.auth-slot{position:absolute;right:32px;top:28px;font-size:11px;color:var(--ink3);z-index:60;}
.auth-slot a{color:var(--o);cursor:pointer;margin-left:6px;display:inline-block;padding:10px 8px;text-decoration:none;}
.auth-slot .dot{color:var(--gn);margin-right:4px;}

/* ===== CONTENT ===== */
.content{padding:32px 0 40px;}
.ph{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;}
.ph h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;font-style:italic;letter-spacing:-0.5px;color:var(--ink);}
.ph .sub{font-size:11px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;}
.ph .acs{margin-left:auto;display:flex;gap:8px;}

/* Buttons */
.bt{padding:8px 16px;border:none;border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;font-weight:500;}
.bp{background:var(--o);color:#fff;box-shadow:0 2px 12px rgba(255,106,0,0.25);}
.bp:hover{background:var(--ol);transform:translateY(-1px);}
.bou{background:transparent;border:1px solid var(--line2);color:var(--ink2);}
.bou:hover{border-color:var(--o);color:var(--o);}
.bs{padding:5px 12px;font-size:11px;}
.brd{background:transparent;border:1px solid rgba(248,113,113,0.4);color:var(--rd);}
.brd:hover{background:rgba(248,113,113,0.1);}

/* Filter chips */
.fb{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap;}
.fc{
  padding:7px 16px;border-radius:100px;
  font-size:11px;font-weight:500;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  color:var(--ink2);cursor:pointer;transition:all 0.15s;font-family:inherit;
}
.fc:hover{border-color:var(--line2);color:var(--ink);}
.fc.act{background:var(--ink);color:var(--bg);border-color:var(--ink);}

/* Library cards */
.el{display:flex;flex-direction:column;gap:12px;}
.ec{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--line);
  border-radius:14px;padding:20px 24px;position:relative;
  transition:all 0.25s;cursor:pointer;overflow:hidden;
}
.ec::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--ink4);transition:background 0.2s;
}
.ec.type-podcast::before{background:var(--o);}
.ec.type-lark::before,.ec.type-transcript::before{background:var(--p);}
.ec.type-note::before{background:var(--ink4);}
.ec:hover{
  border-color:var(--line2);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.et{display:flex;align-items:flex-start;gap:16px;}
.ea{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;
}
.ea img{width:100%;height:100%;object-fit:cover;}
.ei{flex:1;min-width:0;}
.etl{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--ink);letter-spacing:-0.2px;display:flex;align-items:center;gap:8px;}
.star-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0;line-height:1;transition:transform 0.2s;color:var(--ink4);}
.star-btn:hover{transform:scale(1.3);color:var(--yl);}
.star-btn.on{color:var(--yl);}
.em{font-size:10px;color:var(--ink3);display:flex;gap:10px;align-items:center;flex-wrap:wrap;letter-spacing:0.3px;}
.src-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;background:rgba(255,255,255,0.04);border:1px solid var(--line);}
.src-chip.podcast{color:var(--o);border-color:rgba(255,106,0,0.25);}
.src-chip.lark,.src-chip.transcript{color:var(--p);border-color:rgba(167,139,250,0.25);}
.ed{font-size:12.5px;color:var(--ink2);margin-top:10px;line-height:1.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.eac{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.st{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;letter-spacing:0.3px;}
.tn{background:var(--op);color:var(--o);}
.tp{background:rgba(251,191,36,0.12);color:var(--yl);}
.td{background:rgba(74,222,128,0.1);color:var(--gn);}
.ts{background:rgba(255,255,255,0.05);color:var(--ink3);}
.pl{color:var(--o);font-weight:500;}
.pb{margin-top:10px;background:rgba(255,255,255,0.05);border-radius:6px;height:5px;overflow:hidden;}
.pf{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 0.5s;}
.pt{font-size:10px;color:var(--o);margin-top:4px;display:flex;align-items:center;gap:6px;}
.sp{display:inline-block;width:9px;height:9px;border:2px solid var(--op);border-top-color:var(--o);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Pending queue compact */
.pending-block{margin-bottom:26px;padding:18px 22px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:12px;}
.pending-block h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;font-weight:500;}
.pending-block .el{gap:8px;}
.pending-block .ec{padding:14px 18px;}

/* Empty */
.emp{text-align:center;padding:80px 24px;color:var(--ink3);}
.emp .ic{font-size:40px;margin-bottom:14px;opacity:0.5;}
.emp h3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;font-weight:400;color:var(--ink2);margin-bottom:6px;}
.emp p{font-size:12px;}

/* ===== DRAWERS ===== */
.dov{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.dov.open{opacity:1;pointer-events:auto;}
.drw{
  position:fixed;top:0;right:-620px;width:600px;max-width:92vw;height:100vh;
  background:var(--bg2);border-left:1px solid var(--line);
  z-index:201;box-shadow:-20px 0 60px rgba(0,0,0,0.5);
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
.drw.open{right:0;}
.dh{padding:22px 28px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.dh h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px;color:var(--ink);}
.dc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);padding:4px 10px;border-radius:6px;line-height:1;}
.dc:hover{color:var(--ink);background:rgba(255,255,255,0.05);}
.dbody{flex:1;overflow-y:auto;padding:26px 32px;}
.dactions{padding:14px 28px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg);}

/* Markdown in drawer */
.dbody h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;font-style:italic;margin:22px 0 12px;color:var(--ink);}
.dbody h2{font-size:17px;font-weight:600;margin:26px 0 10px;color:var(--o);border-bottom:1px solid var(--op);padding-bottom:8px;letter-spacing:0.2px;}
.dbody h3{font-size:14px;font-weight:600;margin:18px 0 8px;color:var(--ink);}
.dbody p{font-size:14px;line-height:1.9;margin-bottom:12px;color:var(--ink2);}

/* Scrollbar */

  .drw{width:100vw;right:-100vw;}

}

</head>
<body>
<div class="auth-slot" id="authBtn"></div>

<div class="page">
  <section class="hero">
    <div class="logo">murmur</div>
    <div class="tagline"><b>低语</b>knowledge softly gathered</div>
    <div class="ask-box">
      <span class="ask-ic">&#9734;</span>
      <input id="ask-input" placeholder="问问 Murmur 的知识库，比如：Coding 为什么是 AGI 的第二幕？"
             onkeydown="if(event.key==='Enter')doAsk()" maxlength="500">

      </button>

      </button>

        <span class="pill-ic">&#10024;</span> 惊鸿一瞥

  <div class="dh">

      <button class="icon-btn" id="max-btn" onclick="toggleMax()" title="放大 / 恢复">&#9974;</button>

<!-- Login modal (kept as modal for quick dismiss) -->
<div class="mb" id="lm"><div class="ml">
  <h3>管理员登录</h3>
  <p style="font-size:11px;color:var(--ink3);margin-bottom:18px;text-align:center;">登录后可添加来源 · 提炼笔记 · 编辑知识图谱</p>
  <div class="fg"><input type="password" id="lpw" placeholder="输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()" style="text-align:center;font-size:15px;padding:14px;"></div>
  <div id="lerr" style="color:var(--rd);font-size:11px;margin-bottom:8px;text-align:center;"></div>
  <div class="ma" style="justify-content:center;"><button class="bt bp" style="width:100%;padding:12px;" onclick="doLogin()">登录</button></div>
  <p style="font-size:10px;color:var(--ink4);margin-top:14px;text-align:center;">访客可以自由浏览所有内容</p>
</div></div>

<script>
window.addEventListener('error',function(ev){
  var d=document.getElementById('__err')||(function(){var x=document.createElement('div');x.id='__err';x.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#300;color:#fff;font:12px monospace;padding:10px;z-index:9999;max-height:50vh;overflow:auto;white-space:pre-wrap;';document.body&&document.body.appendChild(x);return x;})();
  d.textContent+='[ERR] '+(ev.message||ev.error)+' @ '+ev.filename+':'+ev.lineno+'\n';
});
window.addEventListener('unhandledrejection',function(ev){
  var d=document.getElementById('__err')||(function(){var x=document.createElement('div');x.id='__err';x.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#003;color:#fff;font:12px monospace;padding:10px;z-index:9999;max-height:50vh;overflow:auto;white-space:pre-wrap;';document.body&&document.body.appendChild(x);return x;})();
  d.textContent+='[REJ] '+(ev.reason&&(ev.reason.stack||ev.reason.message||ev.reason))+'\n';
});
let P=[],E=[],V='library',CF=null,ST=null,PT={},termDB={},kgEdits={},isAdmin=false,authToken=localStorage.getItem('authToken')||'';
let skills=[],notes=[];
let _selectedLark=null,_larkTimer=null,_selectedSearch=null,_sT=null;

async function api(p,o={}){
  const headers={'Content-Type':'application/json'};
  if(authToken)headers['X-Auth-Token']=authToken;
  const r=await fetch('/api'+p,{headers,...o});
  if(r.status===401){showLoginModal();throw new Error('unauthorized');}
  return r.json();
}
async function ld(){
  try{
    const auth=await fetch('/api/auth/check',{headers:authToken?{'X-Auth-Token':authToken}:{}}).then(r=>r.json());
    isAdmin=auth.isAdmin;
  }catch(e){isAdmin=false;}
  updateAuthUI();
  [P,E,skills,notes]=await Promise.all([api('/podcasts'),api('/episodes'),api('/skills'),api('/notes')]);
  const editsArr=await api('/kg/edits');
  kgEdits={};editsArr.forEach(e=>kgEdits[e.term]=e);
  E.sort((a,b)=>(b.pub_date?new Date(b.pub_date):0)-(a.pub_date?new Date(a.pub_date):0));
  buildTermDB();updatePillCounts();rv();
  // refresh open source drawer if any
  if(window._openSrc)renderSrc(window._openSrc);
}
function updateAuthUI(){
  const ab=document.getElementById('authBtn');
  if(ab)ab.innerHTML=isAdmin
    ?'<span class="dot">●</span>管理员 <a href="javascript:void(0)" onclick="logout()">登出</a>'
    :'<span style="color:var(--ink4)">○</span> 访客 <a href="javascript:void(0)" onclick="showLoginModal()">登录</a>';
}
function showLoginModal(){sm('lm');setTimeout(()=>document.getElementById('lpw').focus(),60);}
async function doLogin(){
  const pw=document.getElementById('lpw').value;
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(r=>r.json());
    if(r.token){authToken=r.token;localStorage.setItem('authToken',authToken);hm('lm');await ld();}
    else{document.getElementById('lerr').textContent='密码错误';}
  }catch(e){document.getElementById('lerr').textContent='登录失败';}
}
function logout(){authToken='';localStorage.removeItem('authToken');isAdmin=false;ld();}

function updatePillCounts(){
  const pendE=E.filter(e=>e.status==='new'||e.status==='processing').length;
  const el=document.getElementById('pill-ct-podcast');
  if(pendE>0){el.textContent=pendE;el.style.display='';}else el.style.display='none';
}

// ========== TERM DB ==========
function buildTermDB(){
  termDB={};
  const parseDict=(content,src,id)=>{
    if(!content)return;
    const ds=content.split(/#{2,3}\s*(?:模块\s*[C三cⅢ][\s：:]*|专业(?:名词|术语)|(?:名词|术语).*(?:词典|解释|glossary))/i)[1]||'';
    const re=/(?:^|\n)\s*(?:[-*]\s*)?\*\*[\[【]?([^\]】*\n]+?)[\]】]?\*\*[:：]?\s*(?:（([^）\n]*)）|\(([^)\n]*)\))?([^\n]*(?:\n(?!\s*(?:[-*]\s*)?\*\*|\n|#)[^\n#]*)*)/g;
    let m;
    while((m=re.exec(ds))!==null){
      let name=m[1].trim();
      const eng=(m[2]||m[3]||'').trim();
      let def=(m[4]||'').replace(/^[。，,.\s：:]+/,'').trim().replace(/\n/g,' ').trim();
      if(!name||name.length<2||name.length>30)continue;
      if(/^(核心命题|展开论述|话语体系|模块|章节|观点|出处|框架|要求)/.test(name))continue;
      if(!def||def.length<3)continue;
      name=name.replace(/\s+/g,' ');
      if(!termDB[name])termDB[name]={name,eng,def,episodes:[]};
      if(!termDB[name].episodes.find(x=>x.id===id)){
        termDB[name].episodes.push({id,title:src.title,podcast:src.source});
      }
      if(def.length>termDB[name].def.length)termDB[name].def=def;
    }
  };
  E.filter(e=>e.status==='done'&&e.notes).forEach(ep=>parseDict(ep.notes,{title:ep.title,source:ep.podcast_name},ep.id));
  notes.filter(n=>n.status==='done'&&n.content).forEach(n=>parseDict(n.content,{title:n.title,source:n.source_type||'笔记'},'n'+n.id));
}

function highlightTerms(html){
  const terms=Object.keys(termDB).sort((a,b)=>b.length-a.length);
  if(!terms.length)return html;
  terms.forEach(t=>{
    const re=new RegExp(`(?<![\\w*])${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}(?![\\w*])`,'g');
    html=html.replace(re,`<span class="term-hl" data-term="${t}">${t}</span>`);
  });
  return html;
}

function isKnowledgeTerm(t){
  const def=t.def||'';
  if(def.includes('嘉宾定义')||def.includes('嘉宾/受访者定义')||def.includes('受访者定义'))return false;
  if(/^(SEED|萤火|Tilang|OpenRouter|豆包|TopLin|ImageNet|通讯作者|金刚经|道德经|连续思维|技术的自我|编辑|水线|意外值|脏活累活)/.test(t.name))return false;
  if(t.name.length<2||t.name.length>25)return false;
  if(/^(字节|阿里|腾讯|百度|幻方|DeepSeek|华为|北京大学|浙江大学).{0,5}(的|推出|团队|项目|发起)/.test(def))return false;
  const text=(t.name+' '+(t.eng||'')+' '+def).toLowerCase();
  for(const cat of Object.values(TAXONOMY)){for(const sub of Object.values(cat.subs)){if(sub.kw.some(k=>text.includes(k.toLowerCase())))return true;}}
  if(t.eng&&t.eng.length>2)return true;
  if(/概念|理论|效应|原理|定律|法则|模型|方法|术语|经济|心理|社会|哲学|数学/.test(def))return true;
  return false;
}

function classifyTerm(t){
  const text=(t.name+' '+(t.eng||'')+' '+(t.def||'')).toLowerCase();
  let bc='其他',bs='未分类',bsc=0;
  for(const[c,v]of Object.entries(TAXONOMY)){for(const[sub,sv]of Object.entries(v.subs)){let sc=0;sv.kw.forEach(k=>{if(text.includes(k.toLowerCase()))sc++;});if(sc>bsc){bsc=sc;bc=c;bs=sub;}}}
  return{cat:bc,sub:bs,score:bsc};
}

function getSummary(notes){
  if(!notes)return '';
  const quotes=[...notes.matchAll(/[""\u201c]([^""\u201d]{15,80})[""\u201d]/g)].map(m=>m[1]);
  if(quotes.length>=2)return'\u201c'+quotes[0]+'\u201d \u201c'+quotes[1]+'\u201d';
  const match=notes.match(/核心命题[：:]*\s*(.{20,120})/);
  if(match)return match[1];
  const lines=notes.split('\n').filter(l=>l.trim().length>20&&!l.startsWith('#')&&!l.startsWith('-'));
  return lines[0]?.substring(0,120)||'';
}

function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

async function openGlimpseTimeline(){
  if(!isAdmin){showLoginModal();return;}

  if(!todayNote){

      source_type:'glimpse',title:today,content:`# ${today}\n\n`,status:'done',metadata:{}
    })});

  document.getElementById('drw').classList.add('open','max');
  document.getElementById('dov').classList.add('open');

function renderGlimpseTimeline(){
  const today=todayISO();
  const gs=notes.filter(n=>n.source_type==='glimpse').sort((a,b)=>a.title.localeCompare(b.title));
  if(!gs.length){document.getElementById('db').innerHTML='<div class="emp">暂无条目</div>';return;}
  // Group by YYYY-MM
  const groups={};
  gs.forEach(g=>{const ym=g.title.slice(0,7);if(!groups[ym])groups[ym]=[];groups[ym].push(g);});
  const months=Object.keys(groups).sort();

  let html=`<div class="glimpse-nav">${months.map(m=>`<a href="javascript:void(0)" onclick="document.getElementById('g-${m}').scrollIntoView({behavior:'smooth',block:'start'})">${m} · ${groups[m].length}</a>`).join('')}</div>`;

  for(const m of months){
    html+=`<h2 id="g-${m}" class="glimpse-month">${m}<span class="count">${groups[m].length} 条</span></h2>`;
    for(const g of groups[m]){
      const isToday=g.title===today;
      const rendered=marked.parse(cleanMammothEscapes(g.content||'').replace(/^#\s+\d{4}-\d{2}-\d{2}\n+/,''));
      html+=`<article class="glimpse-entry ${isToday?'today':''}" data-gid="${g.id}" data-title="${g.title}">
        <div class="glimpse-hdr">
          <span class="glimpse-date">${g.title}${isToday?'<span class="today-tag">今天</span>':''}</span>
          <div class="glimpse-tools" id="gt-${g.id}">
            <button class="icon-btn" onclick="editGlimpse(${g.id})" title="编辑">&#9998;</button>
            <button class="icon-btn" onclick="exportGlimpse(${g.id})" title="导出">&#11123;</button>
            <button class="icon-btn" onclick="delGlimpse(${g.id})" title="删除">&#10005;</button>
          </div>
        </div>
        <div class="glimpse-body" id="gb-${g.id}">${rendered}</div>
      </article>`;
    }
  }
  document.getElementById('db').innerHTML=html;
  const actions=document.getElementById('dactions');
  actions.innerHTML=`
    <button class="bt bou bs" onclick="extractGlimpseConcepts()" title="把所有条目喂给 concept-extract，术语自动进入知识图谱">&#10024; 提炼概念</button>
    <button class="bt bou bs" onclick="exportGlimpseMonth()">&#11123; 导出当月</button>
    <button class="bt bp bs" onclick="exportGlimpseAll()">&#11123; 全部导出</button>
  `;
  actions.style.display='flex';
  // Scroll to today
  setTimeout(()=>{
    const todayEl=document.querySelector(`.glimpse-entry[data-title="${today}"]`);
    if(todayEl){todayEl.scrollIntoView({behavior:'smooth',block:'center'});
      // Auto-enter edit for today if empty
      const g=gs.find(x=>x.title===today);
      const stripped=(g.content||'').replace(/^#\s+\d{4}-\d{2}-\d{2}\n*/,'').trim();
      if(!stripped)editGlimpse(g.id);
    }
  },150);
}

function editGlimpse(id){
  const el=document.getElementById('gb-'+id);
  if(!el)return;
  el.setAttribute('contenteditable','true');
  el.focus();
  // place caret at end
  const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  const tools=document.getElementById('gt-'+id);
  if(tools)tools.innerHTML=`
    <button class="icon-btn" onclick="saveGlimpse(${id})" title="保存" style="color:var(--yl);border-color:var(--yl);">&#128190;</button>
    <button class="icon-btn" onclick="renderGlimpseTimeline()" title="取消">&#10005;</button>
  `;
}
async function saveGlimpse(id){
  const el=document.getElementById('gb-'+id);
  if(!el)return;
  const g=notes.find(n=>n.id===id);
  const md='# '+(g?g.title:'')+'\n\n'+htmlToMd(el.innerHTML);
  try{
    await api(`/notes/${id}`,{method:'PATCH',body:JSON.stringify({content:md,status:'done'})});
    await ld();
    renderGlimpseTimeline();
  }catch(e){alert('保存失败：'+e.message);}
}
async function delGlimpse(id){
  const g=notes.find(n=>n.id===id);if(!g)return;
  if(!confirm(`删除 ${g.title} 的条目？`))return;
  await api(`/notes/${id}`,{method:'DELETE'});
  await ld();
  renderGlimpseTimeline();
}

let _asking=false;
async function doAsk(){
  if(_asking)return;
  const inp=document.getElementById('ask-input');
  const q=(inp.value||'').trim();
  if(!q){inp.focus();return;}
  _asking=true;
  const panel=document.getElementById('ask-panel');
  const qEl=document.getElementById('ask-q');
  const st=document.getElementById('ask-status');
  const ans=document.getElementById('ask-answer');
  const cits=document.getElementById('ask-cits');
  const btn=document.querySelector('.ask-btn');
  qEl.textContent=q;
  panel.style.display='block';
  st.className='ask-status';
  st.textContent='Murmur 正在翻阅笔记，搜索相关论述...';
  ans.innerHTML='';
  cits.innerHTML='';
  btn.disabled=true;
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  try{
    const r=await api('/ask',{method:'POST',body:JSON.stringify({question:q})});
    if(r.error){throw new Error(r.error);}
    let html=marked.parse(r.answer||'');
    // Replace [EP_ID=X] / [NOTE_ID=X] with clickable chips
    html=html.replace(/\[EP_ID=(\d+)\]/g,(_,id)=>
      `<a class="cit-chip cit-ep" onclick="event.preventDefault();od(${id})" href="#"># ${id}</a>`);
    html=html.replace(/\[NOTE_ID=(\d+)\]/g,(_,id)=>
      `<a class="cit-chip cit-note" onclick="event.preventDefault();odn(${id})" href="#">笔记 ${id}</a>`);
    ans.innerHTML=html;
    st.textContent='';
    // Citation list at bottom
    if(r.citations&&r.citations.length){
      cits.innerHTML='<h4>&#128279; 涉及 '+r.citations.length+' 条笔记</h4>'+
        r.citations.map(c=>{
          const act=c.type==='ep'?`od(${c.id})`:`odn(${c.id})`;
          const podLabel=c.podcast_name?`<span class="cit-pod">${c.podcast_name}</span>`:'';
          return `<div class="cit-item" onclick="${act}"><span class="cit-title">${c.title}</span>${podLabel}</div>`;
        }).join('');
    }
  }catch(e){
    st.className='ask-status err';
    st.textContent='提问失败: '+(e.message||e);
  }finally{
    _asking=false;
    btn.disabled=false;
  }
}

function downloadMd(filename,content){

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function downloadDocx(filename,mdContent){
  const htmlBody=marked.parse(mdContent||'');
  const fullHtml=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;line-height:1.8;color:#222;} blockquote{border-left:3px solid #ccc;padding-left:12px;color:#555;margin:12px 0;} h1{font-size:22px;} h2{font-size:18px;margin-top:24px;border-bottom:1px solid #eee;padding-bottom:6px;} h3{font-size:15px;} code{background:#f4f4f4;padding:2px 5px;border-radius:3px;font-size:13px;} strong{font-weight:700;}</style></head><body>${htmlBody}</body></html>`;
  const blob=htmlDocx.asBlob(fullHtml);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename.replace(/\.md$/,'')+'.docx';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function extractGlimpseConcepts(){
  const gs=notes.filter(n=>n.source_type==='glimpse'&&n.content&&n.content.length>200);
  const pending=gs.filter(g=>!(g.content||'').includes('## 专业名词解释词典'));
  if(!pending.length){alert('所有条目都已提炼过概念');return;}
  if(!confirm(`将对 ${pending.length} 个未提炼的 glimpse 条目逐一跑 concept-extract，术语自动进入知识图谱。继续？`))return;
  // Set skill to concept-extract (category=article)
  const skill=skills.find(s=>s.category==='article');
  if(!skill){alert('找不到 article 类 Skill');return;}
  for(const g of pending){
    await api(`/notes/${g.id}`,{method:'PATCH',body:JSON.stringify({skill_id:skill.id})});
    await api(`/notes/${g.id}/process`,{method:'POST'}).catch(()=>{});
    // Small stagger to avoid server flood

// ---------- Comment highlights ----------
function applyCommentHighlights(root,comments){
  if(!root||!comments||!comments.length)return;
  for(const c of comments){
    try{
      const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:n=>n.parentElement.closest('.cmt-hl')?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT});
      let n,count=0,wrapped=false;
      while((n=walker.nextNode())){
        const idx=n.data.indexOf(c.quote);
        if(idx<0)continue;
        if(count===(c.occurrence||0)){
          const range=document.createRange();
          range.setStart(n,idx);
          range.setEnd(n,idx+c.quote.length);
          const mark=document.createElement('mark');
          mark.className='cmt-hl';
          mark.dataset.cid=c.id;
          mark.dataset.color=c.color||'yellow';
          mark.title=c.comment||'';
          try{range.surroundContents(mark);wrapped=true;break;}catch(e){break;}
        }
        count++;
      }
    }catch(e){}
  }
}

function hideSelTb(){document.getElementById('seltb').classList.remove('visible');}

document.addEventListener('mouseup',e=>{
  if(!_cur||_cur.editing)return;
  if(!isAdmin){hideSelTb();return;}
  const body=document.getElementById('db-content');
  if(!body||!body.contains(e.target)){hideSelTb();return;}
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.rangeCount===0||sel.isCollapsed){hideSelTb();return;}
    const text=sel.toString().trim();
    if(!text||text.length<2){hideSelTb();return;}
    // Only accept if selection is inside body
    const r=sel.getRangeAt(0);
    if(!body.contains(r.commonAncestorContainer)){hideSelTb();return;}
    // Compute occurrence index within body text
    const full=body.textContent;
    let occ=0;
    const pre=getPreSelectionText(body,r);
    let search=-1;
    while((search=full.indexOf(text,search+1))!==-1){
      if(search>=pre.length)break;
      occ++;
    }
    const rect=r.getBoundingClientRect();
    const tb=document.getElementById('seltb');
    tb.classList.add('visible');
    const tbRect=tb.getBoundingClientRect();
    tb.style.top=(rect.top-tbRect.height-8+window.scrollY)+'px';
    tb.style.left=Math.max(12,Math.min(window.innerWidth-tbRect.width-12,rect.left+rect.width/2-tbRect.width/2))+'px';
    _cur.pendingSel={text,occurrence:occ};
  },10);
});

function getPreSelectionText(root,range){
  const pre=range.cloneRange();
  pre.selectNodeContents(root);
  pre.setEnd(range.startContainer,range.startOffset);
  return pre.toString();
}

async function parseFileContent(file){
  const ext=file.name.split('.').pop().toLowerCase();
  try{
    if(ext==='md'||ext==='markdown'||ext==='txt'){return await file.text();}
    else if(ext==='docx'){
      const arrayBuffer=await file.arrayBuffer();
      // Use HTML output so tables/lists survive, then convert ourselves.
      const result=await mammoth.convertToHtml({arrayBuffer});
      return htmlToMd(result.value);
    }
    else{alert('不支持的格式');return null;}
  }catch(e){alert('解析失败：'+e.message);return null;}
}

// Lightweight HTML → Markdown: handles headings, paragraphs, bold/italic,
// lists, and tables (as GFM pipe tables). Strips noise.
function htmlToMd(html){
  const wrap=document.createElement('div');wrap.innerHTML=html;
  const out=[];
  function text(n){return (n.textContent||'').replace(/\s+/g,' ').trim();}
  function tableToMd(tbl){
    const rows=[...tbl.querySelectorAll('tr')].map(tr=>
      [...tr.querySelectorAll('th,td')].map(td=>text(td).replace(/\|/g,'\\|'))
    );
    if(!rows.length)return '';
    const cols=Math.max(...rows.map(r=>r.length));
    rows.forEach(r=>{while(r.length<cols)r.push('');});
    const lines=[];
    lines.push('| '+rows[0].join(' | ')+' |');
    lines.push('|'+' --- |'.repeat(cols));
    for(let i=1;i<rows.length;i++)lines.push('| '+rows[i].join(' | ')+' |');
    return lines.join('\n');
  }
  function walk(node,ctx){
    ctx=ctx||{};
    for(const n of node.childNodes){
      if(n.nodeType===3){out.push(n.textContent);continue;}
      if(n.nodeType!==1)continue;
      const t=n.tagName.toLowerCase();
      if(/^h[1-6]$/.test(t)){out.push('\n\n'+'#'.repeat(+t[1])+' ');walk(n,ctx);out.push('\n\n');}
      else if(t==='p'){walk(n,ctx);out.push('\n\n');}
      else if(t==='br'){out.push('  \n');}
      else if(t==='strong'||t==='b'){out.push('**');walk(n,ctx);out.push('**');}
      else if(t==='em'||t==='i'){out.push('*');walk(n,ctx);out.push('*');}
      else if(t==='code'){out.push('`');walk(n,ctx);out.push('`');}
      else if(t==='a'){out.push('[');walk(n,ctx);out.push('](' + (n.getAttribute('href')||'') + ')');}
      else if(t==='ul'){out.push('\n');walk(n,{...ctx,list:'ul'});out.push('\n');}
      else if(t==='ol'){out.push('\n');walk(n,{...ctx,list:'ol',idx:1});out.push('\n');}
      else if(t==='li'){
        out.push(ctx.list==='ol'?((ctx.idx++)+'. '):'- ');
        walk(n,{...ctx,list:null});
        out.push('\n');
      }
      else if(t==='blockquote'){out.push('\n> ');walk(n,ctx);out.push('\n\n');}
      else if(t==='hr'){out.push('\n---\n');}
      else if(t==='table'){out.push('\n\n'+tableToMd(n)+'\n\n');}
      else if(t==='img'){out.push('![]('+ (n.getAttribute('src')||'')+')');}
      else{walk(n,ctx);}
    }
  }
  walk(wrap);
  return out.join('')
    .replace(/\\([-.\_\[\]()#+!*<>])/g,'$1')  // unescape mammoth
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function cleanMammothEscapes(s){return (s||'').replace(/\\([-.\_\[\]()#+!*<>])/g,'$1');}

      <button class="bt bp" style="width:100%;padding:13px;font-size:13px;" onclick="addNote()">&#9889; 添加并提炼</button>
    </div>`;
}

// Podcast search in drawer
function ds(){clearTimeout(_sT);_sT=setTimeout(ss,400);}
async function ss(){
  const q=document.getElementById('ps').value.trim();const el=document.getElementById('sr');
  if(!q){el.innerHTML='';return;}
  el.innerHTML='<div class="sl">搜索中...</div>';
  const r=await api(`/search?q=${encodeURIComponent(q)}`);
  if(!r.length){el.innerHTML='<div class="sl">未找到</div>';return;}
  el.innerHTML=r.map((x,i)=>`<div class="si" onclick="pss(${i})">${x.artwork?`<img src="${x.artwork}">`:'<div class="iph">🎙</div>'}<div><div class="sn">${x.name}</div><div class="sa">${x.artist||''} · ${x.episode_count||'?'} 集</div></div></div>`).join('');
  window._sr=r;
}
async function pss(i){
  const r=window._sr[i];if(!r)return;
  await api('/podcasts',{method:'POST',body:JSON.stringify({name:r.name,rss_url:r.rss_url||null,artwork:r.artwork||null})});
  await ld();
}
function addManual(){
  const n=prompt('播客名称');if(!n)return;
  const u=prompt('RSS 链接（可选）','');
  api('/podcasts',{method:'POST',body:JSON.stringify({name:n,rss_url:u||null})}).then(()=>ld());
}
function addOneoff(){
  const t=prompt('单集标题');if(!t)return;
  const l=prompt('链接（可选）','');
  api('/episodes/oneoff',{method:'POST',body:JSON.stringify({title:t,link:l||null,description:null})}).then(()=>ld());
}
async function dp(id,nm){if(!confirm(`取消订阅「${nm}」？`))return;await api(`/podcasts/${id}`,{method:'DELETE'});if(CF===id)CF=null;await ld();}
async function doRefresh(b){b.disabled=true;b.textContent='...';const r=await api('/refresh',{method:'POST'});b.disabled=false;b.innerHTML='&#8635; 刷新 RSS';await ld();if(r.new_episodes>0)alert(`发现 ${r.new_episodes} 个新剧集！`);}

// Lark: paste URL → server uses lark-cli docs +fetch
async function addLarkByUrl(){
  const url=document.getElementById('lark-url').value.trim();
  if(!url){alert('请粘贴飞书文档链接');return;}
  if(!/^https?:\/\//.test(url)){alert('请输入完整的 https 链接');return;}
  const skillId=parseInt(document.getElementById('lark-skill').value)||null;
  closeSrc();
  const r=await api('/notes',{method:'POST',body:JSON.stringify({
    source_type:'lark',source_ref:url,title:url,skill_id:skillId,
    metadata:{lark_url:url}
  })});
  await ld();
  if(r&&r.id){await processNote(r.id);}
}

// Note drawer
async function handleNoteFile(event){
  const file=event.target.files[0];if(!file)return;
  const base=file.name.replace(/\.[^.]+$/,'');
  const titleInput=document.getElementById('note-title');
  if(!titleInput.value.trim())titleInput.value=base;
  const text=await parseFileContent(file);
  if(text!==null)document.getElementById('note-content').value=text;
}
async function addNote(){
  const title=document.getElementById('note-title').value.trim();
  const content=document.getElementById('note-content').value.trim();
  const skillId=parseInt(document.getElementById('note-skill').value)||null;
  if(!title||!content){alert('标题和内容不能为空');return;}
  closeSrc();
  const r=await api('/notes',{method:'POST',body:JSON.stringify({
    source_type:'note',title,raw_content:content,skill_id:skillId,metadata:{}
  })});
  await ld();
  if(r&&r.id){await processNote(r.id);}
}

function sm(id){document.getElementById(id).classList.add('vis');}
function hm(id){document.getElementById(id).classList.remove('vis');}

ld();setInterval(ld,300000);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){cd();closeSrc();hidePop();document.querySelectorAll('.mb.vis').forEach(m=>m.classList.remove('vis'));}});
</script>
