<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>murmur · 低语</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.0/mammoth.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d0d0d;
  --bg2:#131313;
  --bg3:#1a1a1a;
  --line:rgba(255,255,255,0.08);
  --line2:rgba(255,255,255,0.12);
  --ink:#f5f0eb;
  --ink2:rgba(245,240,235,0.72);
  --ink3:rgba(245,240,235,0.42);
  --ink4:rgba(245,240,235,0.22);
  --o:#FF6A00;
  --ol:#FF8C33;
  --op:rgba(255,106,0,0.12);
  --p:#A78BFA;
  --pl:rgba(167,139,250,0.15);
  --gn:#4ADE80;
  --rd:#F87171;
  --yl:#FBBF24;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
body{position:relative;overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 900px 520px at 50% -10%,rgba(255,106,0,0.13),transparent 60%),
             radial-gradient(ellipse 600px 400px at 85% 20%,rgba(167,139,250,0.06),transparent 55%);
}
.page{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 32px 120px;}

/* ===== HERO ===== */
.hero{padding:88px 0 48px;text-align:center;position:relative;}
.hero .logo{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:116px;font-weight:300;font-style:italic;
  letter-spacing:-2px;line-height:0.9;
  background:linear-gradient(180deg,#fff 0%,#f5f0eb 40%,#c9b89a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 60px rgba(255,106,0,0.08);
  margin-bottom:14px;
}
.hero .tagline{
  font-size:12px;letter-spacing:5px;text-transform:uppercase;
  color:var(--ink3);font-weight:300;margin-bottom:40px;
}
.hero .tagline b{color:var(--o);font-weight:400;font-style:italic;text-transform:none;letter-spacing:1px;font-family:'Cormorant Garamond',serif;font-size:15px;margin-right:8px;}
.pills{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.pill{
  display:inline-flex;align-items:center;gap:10px;
  padding:13px 22px;border-radius:100px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line2);
  color:var(--ink);font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(8px);
}
.pill:hover{
  background:rgba(255,255,255,0.06);
  border-color:var(--o);
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(255,106,0,0.12);
}
.pill .pill-ic{font-size:15px;}
.pill .pill-ct{
  margin-left:4px;font-size:10px;font-weight:700;
  background:var(--o);color:#fff;padding:2px 7px;border-radius:8px;min-width:18px;text-align:center;
}
.pill.pill-lark:hover{border-color:var(--p);box-shadow:0 10px 30px rgba(167,139,250,0.15);}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;justify-content:center;
  padding:20px 0 4px;margin-top:8px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,13,0.85);backdrop-filter:blur(12px);
}
.tab{
  padding:12px 22px;background:none;border:none;
  color:var(--ink3);font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:400;font-style:italic;letter-spacing:0.5px;
  cursor:pointer;transition:all 0.2s;position:relative;
}
.tab:hover{color:var(--ink);}
.tab.act{color:var(--o);}
.tab.act::after{
  content:'';position:absolute;left:22px;right:22px;bottom:-1px;height:2px;
  background:linear-gradient(90deg,transparent,var(--o),transparent);
}
.auth-slot{position:absolute;right:32px;top:28px;font-size:11px;color:var(--ink3);z-index:60;}
.auth-slot a{color:var(--o);cursor:pointer;margin-left:6px;}
.auth-slot .dot{color:var(--gn);margin-right:4px;}

/* ===== CONTENT ===== */
.content{padding:32px 0 40px;}
.ph{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;}
.ph h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;font-style:italic;letter-spacing:-0.5px;color:var(--ink);}
.ph .sub{font-size:11px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;}
.ph .acs{margin-left:auto;display:flex;gap:8px;}

/* Buttons */
.bt{padding:8px 16px;border:none;border-radius:7px;font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;font-weight:500;}
.bp{background:var(--o);color:#fff;box-shadow:0 2px 12px rgba(255,106,0,0.25);}
.bp:hover{background:var(--ol);transform:translateY(-1px);}
.bou{background:transparent;border:1px solid var(--line2);color:var(--ink2);}
.bou:hover{border-color:var(--o);color:var(--o);}
.bs{padding:5px 12px;font-size:11px;}
.brd{background:transparent;border:1px solid rgba(248,113,113,0.4);color:var(--rd);}
.brd:hover{background:rgba(248,113,113,0.1);}

/* Filter chips */
.fb{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap;}
.fc{
  padding:7px 16px;border-radius:100px;
  font-size:11px;font-weight:500;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  color:var(--ink2);cursor:pointer;transition:all 0.15s;font-family:inherit;
}
.fc:hover{border-color:var(--line2);color:var(--ink);}
.fc.act{background:var(--ink);color:var(--bg);border-color:var(--ink);}

/* Library cards */
.el{display:flex;flex-direction:column;gap:12px;}
.ec{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--line);
  border-radius:14px;padding:20px 24px;position:relative;
  transition:all 0.25s;cursor:pointer;overflow:hidden;
}
.ec::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--ink4);transition:background 0.2s;
}
.ec.type-podcast::before{background:var(--o);}
.ec.type-lark::before,.ec.type-transcript::before{background:var(--p);}
.ec.type-note::before{background:var(--ink4);}
.ec:hover{
  border-color:var(--line2);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.et{display:flex;align-items:flex-start;gap:16px;}
.ea{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:18px;overflow:hidden;
}
.ea img{width:100%;height:100%;object-fit:cover;}
.ei{flex:1;min-width:0;}
.etl{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--ink);letter-spacing:-0.2px;display:flex;align-items:center;gap:8px;}
.star-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0;line-height:1;transition:transform 0.2s;color:var(--ink4);}
.star-btn:hover{transform:scale(1.3);color:var(--yl);}
.star-btn.on{color:var(--yl);}
.em{font-size:10px;color:var(--ink3);display:flex;gap:10px;align-items:center;flex-wrap:wrap;letter-spacing:0.3px;}
.src-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;background:rgba(255,255,255,0.04);border:1px solid var(--line);}
.src-chip.podcast{color:var(--o);border-color:rgba(255,106,0,0.25);}
.src-chip.lark,.src-chip.transcript{color:var(--p);border-color:rgba(167,139,250,0.25);}
.ed{font-size:12.5px;color:var(--ink2);margin-top:10px;line-height:1.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.eac{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.st{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;letter-spacing:0.3px;}
.tn{background:var(--op);color:var(--o);}
.tp{background:rgba(251,191,36,0.12);color:var(--yl);}
.td{background:rgba(74,222,128,0.1);color:var(--gn);}
.ts{background:rgba(255,255,255,0.05);color:var(--ink3);}
.pl{color:var(--o);font-weight:500;}
.pb{margin-top:10px;background:rgba(255,255,255,0.05);border-radius:6px;height:5px;overflow:hidden;}
.pf{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--o),var(--ol));transition:width 0.5s;}
.pt{font-size:10px;color:var(--o);margin-top:4px;display:flex;align-items:center;gap:6px;}
.sp{display:inline-block;width:9px;height:9px;border:2px solid var(--op);border-top-color:var(--o);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Pending queue compact */
.pending-block{margin-bottom:26px;padding:18px 22px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:12px;}
.pending-block h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;font-weight:500;}
.pending-block .el{gap:8px;}
.pending-block .ec{padding:14px 18px;}

/* Empty */
.emp{text-align:center;padding:80px 24px;color:var(--ink3);}
.emp .ic{font-size:40px;margin-bottom:14px;opacity:0.5;}
.emp h3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;font-weight:400;color:var(--ink2);margin-bottom:6px;}
.emp p{font-size:12px;}

/* ===== DRAWERS ===== */
.dov{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.dov.open{opacity:1;pointer-events:auto;}
.drw{
  position:fixed;top:0;right:-620px;width:600px;max-width:92vw;height:100vh;
  background:var(--bg2);border-left:1px solid var(--line);
  z-index:201;box-shadow:-20px 0 60px rgba(0,0,0,0.5);
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
.drw.open{right:0;}
.dh{padding:22px 28px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.dh h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px;color:var(--ink);}
.dc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);padding:4px 10px;border-radius:6px;line-height:1;}
.dc:hover{color:var(--ink);background:rgba(255,255,255,0.05);}
.dbody{flex:1;overflow-y:auto;padding:26px 32px;}
.dactions{padding:14px 28px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg);}

/* Markdown in drawer */
.dbody h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;font-style:italic;margin:22px 0 12px;color:var(--ink);}
.dbody h2{font-size:17px;font-weight:600;margin:26px 0 10px;color:var(--o);border-bottom:1px solid var(--op);padding-bottom:8px;letter-spacing:0.2px;}
.dbody h3{font-size:14px;font-weight:600;margin:18px 0 8px;color:var(--ink);}
.dbody p{font-size:14px;line-height:1.9;margin-bottom:12px;color:var(--ink2);}
.dbody ul,.dbody ol{padding-left:20px;margin-bottom:12px;}
.dbody li{font-size:14px;line-height:1.85;margin-bottom:4px;color:var(--ink2);}
.dbody blockquote{border-left:2px solid var(--o);padding:10px 16px;margin:12px 0;background:rgba(255,106,0,0.05);border-radius:0 8px 8px 0;font-size:13px;line-height:1.8;color:var(--ink2);font-style:italic;}
.dbody strong{color:var(--ink);font-weight:600;}
.dbody hr{border:none;border-top:1px solid var(--line);margin:24px 0;}
.dbody code{background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--p);}
.dbody a{color:var(--o);}
.dbody table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12.5px;background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.dbody th,.dbody td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.65;}
.dbody th{background:rgba(255,106,0,0.08);color:var(--o);font-weight:600;font-size:11px;letter-spacing:0.3px;text-transform:none;border-bottom:1px solid rgba(255,106,0,0.2);}
.dbody td{color:var(--ink2);}
.dbody tr:last-child td{border-bottom:none;}
.dbody tr:hover td{background:rgba(255,255,255,0.02);}

.term-hl{background:linear-gradient(to bottom,transparent 62%,rgba(167,139,250,0.22) 62%);cursor:pointer;font-weight:500;border-bottom:1px dashed rgba(167,139,250,0.5);color:var(--ink);}
.term-pop{position:fixed;z-index:300;background:var(--bg3);border:1px solid rgba(167,139,250,0.3);border-radius:12px;padding:16px 18px;box-shadow:0 20px 50px rgba(0,0,0,0.6);max-width:360px;min-width:260px;display:none;}
.term-pop.visible{display:block;}
.term-pop .tp-name{font-size:14px;font-weight:700;color:var(--p);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.term-pop .tp-name .tp-tag{font-size:9px;background:var(--pl);color:var(--p);padding:1px 6px;border-radius:4px;font-weight:500;}
.term-pop .tp-def{font-size:12px;line-height:1.7;color:var(--ink2);}
.term-pop .tp-refs{margin-top:8px;border-top:1px solid var(--line);padding-top:8px;}
.term-pop .tp-ref{font-size:10px;color:var(--ink3);padding:3px 0;cursor:pointer;}
.term-pop .tp-ref:hover{color:var(--o);}

.backlinks{margin-top:32px;padding-top:22px;border-top:1px solid var(--line);}
.backlinks h3{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--p);margin-bottom:12px;font-weight:600;font-family:'Inter',sans-serif;font-style:normal;}
.bl-item{padding:10px 14px;background:rgba(167,139,250,0.05);border-radius:8px;margin-bottom:7px;border-left:2px solid var(--p);cursor:pointer;transition:all 0.15s;}
.bl-item:hover{background:rgba(167,139,250,0.1);}
.bl-item .bl-term{font-size:12px;font-weight:600;color:var(--p);}
.bl-item .bl-def{font-size:11px;color:var(--ink3);margin-top:2px;}

/* Source drawer content */
.src-section{margin-bottom:26px;}
.src-section h4{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;font-weight:500;}
.src-input{
  width:100%;padding:12px 16px;background:rgba(255,255,255,0.04);
  border:1px solid var(--line2);border-radius:10px;color:var(--ink);
  font-family:inherit;font-size:13px;transition:all 0.2s;
}
.src-input:focus{outline:none;border-color:var(--o);background:rgba(255,255,255,0.06);}
.src-textarea{min-height:220px;resize:vertical;line-height:1.7;font-family:'JetBrains Mono',monospace;font-size:12px;}

.sub-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 14px 7px 7px;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid var(--line2);cursor:pointer;font-size:12px;color:var(--ink);transition:all 0.15s;position:relative;}
.sub-chip:hover{border-color:var(--o);color:var(--o);transform:translateY(-1px);}
.sub-chip.act{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.sub-chip.act .nbadge{background:var(--o);color:#fff;}
.sub-chip img{width:24px;height:24px;border-radius:6px;object-fit:cover;}
.sub-chip .nbadge{background:var(--op);color:var(--o);font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;}
.sub-chip .x{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:12px;padding:0 2px;margin-left:2px;display:none;}
.sub-chip:hover .x{display:inline;}
.sub-chip.add{border-style:dashed;color:var(--ink3);padding:7px 16px;background:transparent;}
.sub-chip.add:hover{color:var(--o);border-color:var(--o);}

.srs{margin-top:10px;max-height:240px;overflow-y:auto;}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.si:hover{background:rgba(255,255,255,0.04);border-color:var(--line2);}
.si.sel{background:var(--op);border-color:var(--o);}
.si img{width:40px;height:40px;border-radius:7px;object-fit:cover;}
.si .iph{width:40px;height:40px;border-radius:7px;background:var(--pl);display:flex;align-items:center;justify-content:center;color:var(--p);font-size:16px;}
.sn{font-size:12px;font-weight:600;color:var(--ink);}
.sa{font-size:10px;color:var(--ink3);margin-top:2px;}
.sl{text-align:center;padding:16px;color:var(--ink3);font-size:11px;}

/* Modal (for login only) */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:400;}
.mb.vis{display:flex;}
.ml{background:var(--bg2);border:1px solid var(--line2);border-radius:16px;padding:28px;width:400px;max-width:90vw;}
.ml h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;font-weight:400;margin-bottom:12px;color:var(--ink);text-align:center;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;font-weight:500;}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--line2);border-radius:9px;font-size:13px;font-family:inherit;color:var(--ink);}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--o);}
.fg select option{background:var(--bg3);}
.fg .hint{font-size:10px;color:var(--ink3);margin-top:4px;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* KG */
.kg-cat-header{cursor:pointer;display:flex;align-items:center;gap:10px;padding:14px 18px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:12px;margin-bottom:12px;border:1px solid var(--line);border-left-width:3px;}
.kg-cat-header:hover{border-color:var(--line2);}
.kg-sub-title{font-size:12px;font-weight:600;padding:6px 0 8px;display:flex;align-items:center;gap:7px;letter-spacing:0.3px;}
.kn{background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:all 0.2s;}
.kn:hover{border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.04);}
.kg-collapsed{display:none!important;}

/* Skills */
.skill-card{background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:14px;}
.skill-card h4{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--ink);}
.skill-card .skill-meta{font-size:10px;color:var(--ink3);margin-bottom:14px;line-height:1.7;letter-spacing:0.2px;}
.skill-card textarea{width:100%;min-height:220px;background:var(--bg);border:1px solid var(--line2);border-radius:9px;padding:14px;font-size:12px;line-height:1.7;font-family:'JetBrains Mono',monospace;resize:vertical;color:var(--ink);}
.skill-card textarea:focus{outline:none;border-color:var(--o);}
.skill-category-header{font-size:11px;font-weight:600;margin:24px 0 12px;color:var(--ink3);letter-spacing:1.2px;text-transform:uppercase;}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15);}

@media(max-width:768px){
  .page{padding:0 18px 100px;}
  .hero{padding:60px 0 36px;}
  .hero .logo{font-size:72px;}
  .pills{gap:8px;}
  .pill{padding:10px 18px;font-size:12px;}
  .drw{width:100vw;right:-100vw;}

<script>
let P=[],E=[],V='library',CF=null,ST=null,PT={},termDB={},kgEdits={},isAdmin=false,authToken=localStorage.getItem('authToken')||'';
let skills=[],notes=[];
let _selectedLark=null,_larkTimer=null,_selectedSearch=null,_sT=null;

async function api(p,o={}){
  const headers={'Content-Type':'application/json'};
  if(authToken)headers['X-Auth-Token']=authToken;
  const r=await fetch('/api'+p,{headers,...o});
  if(r.status===401){showLoginModal();throw new Error('unauthorized');}
  return r.json();
}
async function ld(){
  try{
    const auth=await fetch('/api/auth/check',{headers:authToken?{'X-Auth-Token':authToken}:{}}).then(r=>r.json());
    isAdmin=auth.isAdmin;
  }catch(e){isAdmin=false;}
  updateAuthUI();
  [P,E,skills,notes]=await Promise.all([api('/podcasts'),api('/episodes'),api('/skills'),api('/notes')]);
  const editsArr=await api('/kg/edits');
  kgEdits={};editsArr.forEach(e=>kgEdits[e.term]=e);
  E.sort((a,b)=>(b.pub_date?new Date(b.pub_date):0)-(a.pub_date?new Date(a.pub_date):0));
  buildTermDB();updatePillCounts();rv();
  // refresh open source drawer if any
  if(window._openSrc)renderSrc(window._openSrc);
}
function updateAuthUI(){
  const ab=document.getElementById('authBtn');
  if(ab)ab.innerHTML=isAdmin
    ?'<span class="dot">●</span>管理员 <a onclick="logout()">登出</a>'
    :'<span style="color:var(--ink4)">○</span> 访客 <a onclick="showLoginModal()">登录</a>';
}
function showLoginModal(){sm('lm');setTimeout(()=>document.getElementById('lpw').focus(),60);}
async function doLogin(){
  const pw=document.getElementById('lpw').value;
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(r=>r.json());
    if(r.token){authToken=r.token;localStorage.setItem('authToken',authToken);hm('lm');await ld();}
    else{document.getElementById('lerr').textContent='密码错误';}
  }catch(e){document.getElementById('lerr').textContent='登录失败';}
}
function logout(){authToken='';localStorage.removeItem('authToken');isAdmin=false;ld();}

function updatePillCounts(){
  const pendE=E.filter(e=>e.status==='new'||e.status==='processing').length;
  const el=document.getElementById('pill-ct-podcast');
  if(pendE>0){el.textContent=pendE;el.style.display='';}else el.style.display='none';
}

// ========== TERM DB ==========
function buildTermDB(){
  termDB={};
  const parseDict=(content,src,id)=>{
    if(!content)return;
    const ds=content.split(/##\s*(?:模块\s*C|专业名词|名词.*词典)/i)[1]||'';
    const re=/(?:^|\n)\s*(?:[-*]\s*)?\*\*[\[【]?([^\]】*\n]+?)[\]】]?\*\*[:：]?\s*(?:（([^）\n]*)）|\(([^)\n]*)\))?([^\n]*(?:\n(?!\s*(?:[-*]\s*)?\*\*|\n|#)[^\n#]*)*)/g;
    let m;
    while((m=re.exec(ds))!==null){
      let name=m[1].trim();
      const eng=(m[2]||m[3]||'').trim();
      let def=(m[4]||'').replace(/^[。，,.\s：:]+/,'').trim().replace(/\n/g,' ').trim();
      if(!name||name.length<2||name.length>30)continue;
      if(/^(核心命题|展开论述|话语体系|模块|章节|观点|出处|框架|要求)/.test(name))continue;
      if(!def||def.length<3)continue;
      name=name.replace(/\s+/g,' ');
      if(!termDB[name])termDB[name]={name,eng,def,episodes:[]};
      if(!termDB[name].episodes.find(x=>x.id===id)){
        termDB[name].episodes.push({id,title:src.title,podcast:src.source});
      }
      if(def.length>termDB[name].def.length)termDB[name].def=def;
    }
  };
  E.filter(e=>e.status==='done'&&e.notes).forEach(ep=>parseDict(ep.notes,{title:ep.title,source:ep.podcast_name},ep.id));
  notes.filter(n=>n.status==='done'&&n.content).forEach(n=>parseDict(n.content,{title:n.title,source:n.source_type||'笔记'},'n'+n.id));
}

function highlightTerms(html){
  const terms=Object.keys(termDB).sort((a,b)=>b.length-a.length);
  if(!terms.length)return html;
  terms.forEach(t=>{
    const re=new RegExp(`(?<![\\w*])${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}(?![\\w*])`,'g');
    html=html.replace(re,`<span class="term-hl" data-term="${t}">${t}</span>`);
  });
  return html;
}

// ========== NAV ==========
function sw(v){V=v;CF=null;ST=null;window._pf=null;document.querySelectorAll('.tab').forEach(n=>n.classList.toggle('act',n.dataset.v===v));rv();}

function rv(){
  const m=document.getElementById('mc');
  ({library:rLibrary,kg:rKG,skills:rSkills}[V]||rLibrary)(m);
}

// ========== LIBRARY ==========
function rLibrary(el){
  const tf=ST;
  const pendE=E.filter(e=>e.status==='new'||e.status==='processing');
  const pendN=notes.filter(n=>n.status==='new'||n.status==='processing');

  const doneE=E.filter(e=>e.status==='done').map(e=>({kind:'ep',type:'podcast',id:e.id,title:e.title,source:e.podcast_name,date:e.pub_date,content:e.notes,starred:e.starred,artwork:e.podcast_artwork,_raw:e}));
  const doneN=notes.filter(n=>n.status==='done').map(n=>({kind:'note',type:n.source_type||'note',id:n.id,title:n.title,source:n.source_type,date:n.created_at,content:n.content,starred:n.starred,_raw:n}));
  let allDone=[...doneE,...doneN].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));

  const counts={all:allDone.length,podcast:doneE.length,lark:doneN.filter(x=>x.type==='lark').length,note:doneN.filter(x=>x.type==='note').length,starred:allDone.filter(x=>x.starred).length};

  let html=`<div class="ph"><h2>Library</h2><span class="sub">${counts.all} pieces</span></div>
    <div class="fb">
      <span class="fc ${!tf?'act':''}" onclick="ST=null;rv()">全部 · ${counts.all}</span>
      <span class="fc ${tf==='podcast'?'act':''}" onclick="ST='podcast';rv()">&#127911; 播客 · ${counts.podcast}</span>
      <span class="fc ${tf==='lark'?'act':''}" onclick="ST='lark';rv()">&#128214; 飞书 · ${counts.lark}</span>
      <span class="fc ${tf==='note'?'act':''}" onclick="ST='note';rv()">&#9997; 笔记 · ${counts.note}</span>
      <span class="fc ${tf==='starred'?'act':''}" onclick="ST='starred';rv()">&#11088; 收藏 · ${counts.starred}</span>
    </div>`;

  // Pending queue (show if no filter or matching)
  if(!tf&&(pendE.length||pendN.length)){
    html+=`<div class="pending-block"><h3>&#9889; 处理中 / 待处理 · ${pendE.length+pendN.length}</h3><div class="el">${pendE.map(rc).join('')}${pendN.map(rnItem).join('')}</div></div>`;
  }

  // === Podcast sub-view: full subscription library (all episodes, any status) ===
  if(tf==='podcast'){
    const subs=P.filter(p=>p.name!=='_散装收藏');
    let f=E;
    if(CF)f=f.filter(e=>e.podcast_id===CF);
    const sf=window._pf||null;
    const sCounts={all:f.length,new:f.filter(e=>e.status==='new').length,processing:f.filter(e=>e.status==='processing').length,done:f.filter(e=>e.status==='done').length,skipped:f.filter(e=>e.status==='skipped').length};

    html+=`<div style="margin-bottom:18px;">
      <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;">订阅 · 点击筛选</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div class="sub-chip ${!CF?'act':''}" onclick="CF=null;rv()">全部 · ${E.length}</div>
        ${subs.map(p=>`<div class="sub-chip ${CF===p.id?'act':''}" onclick="CF=${p.id};rv()">
          ${p.artwork?`<img src="${p.artwork}">`:'<span style="width:24px;text-align:center;">🎙</span>'}
          ${p.name}${p.new_count>0?` <span class="nbadge">${p.new_count}</span>`:''}
          ${isAdmin?`<button class="x" onclick="event.stopPropagation();dp(${p.id},'${p.name.replace(/'/g,"\\'")}')">✕</button>`:''}
        </div>`).join('')}
        ${isAdmin?`<div class="sub-chip add" onclick="openSrc('podcast')">+ 添加订阅</div>`:''}
      </div>
    </div>
    <div class="fb" style="margin-top:6px;">
      ${['all','new','processing','done','skipped'].map(k=>{const l={all:'全部',new:'待处理',processing:'提炼中',done:'已提炼',skipped:'已跳过'};return`<span class="fc ${(k==='all'&&!sf)||sf===k?'act':''}" onclick="window._pf=${k==='all'?'null':`'${k}'`};rv()">${l[k]} · ${sCounts[k]}</span>`;}).join('')}
    </div>`;

    const filtered=sf?f.filter(e=>e.status===sf):f;
    html+=`<div class="el">${filtered.length?filtered.map(rc).join(''):'<div class="emp"><div class="ic">&#127911;</div><h3>暂无剧集</h3></div>'}</div>`;
    el.innerHTML=html;
    filtered.filter(e=>e.status==='processing').forEach(e=>poll(e.id));
    return;
  }

  // === Default / other filters: unified done list ===
  let filtered=allDone;
  if(tf==='starred')filtered=allDone.filter(x=>x.starred);
  else if(tf)filtered=allDone.filter(x=>x.type===tf);

  html+=`<div class="el">${filtered.length?filtered.map(renderLibItem).join(''):`<div class="emp"><div class="ic">&#128218;</div><h3>silence</h3><p>点击上方的 pill 开始添加内容</p></div>`}</div>`;
  el.innerHTML=html;
  pendE.filter(e=>e.status==='processing').forEach(e=>poll(e.id));
  pendN.filter(n=>n.status==='processing').forEach(n=>pollNote(n.id));
}

function renderLibItem(item){
  const typeIcon={podcast:'&#127911;',lark:'&#128214;',note:'&#9997;'}[item.type]||'&#128196;';
  const dt=item.date?new Date(item.date).toLocaleDateString('zh-CN'):'';
  const summary=item.content?getSummary(item.content):'';
  const starred=item.starred?'&#9733;':'&#9734;';
  const clickFn=item.kind==='ep'?`od(${item.id})`:`odn(${item.id})`;
  const toggleFn=item.kind==='ep'?`toggleStar(${item.id})`:`toggleStarN(${item.id})`;
  const sourceLabel=item.type==='podcast'?(item.source==='_散装收藏'?'散装':item.source):(item.type==='lark'?'飞书文档':'笔记');
  return`<div class="ec type-${item.type}" onclick="${clickFn}"><div class="et">
    ${item.artwork?`<div class="ea"><img src="${item.artwork}"></div>`:`<div class="ea">${typeIcon}</div>`}
    <div class="ei"><div class="etl">${isAdmin?`<button class="star-btn ${item.starred?'on':''}" onclick="event.stopPropagation();${toggleFn}">${starred}</button>`:(item.starred?'&#9733; ':'')}${item.title}</div>
      <div class="em"><span class="src-chip ${item.type}">${typeIcon} ${sourceLabel}</span>${dt?`<span>${dt}</span>`:''}</div>
      ${summary?`<div class="ed">${summary}</div>`:''}
    </div></div></div>`;
}

// ========== SKILLS ==========
function rSkills(el){
  const grouped={};
  skills.forEach(s=>{if(!grouped[s.category])grouped[s.category]=[];grouped[s.category].push(s);});
  const labels={podcast:'&#127911; 播客专用',transcript:'&#128483; 对谈 / 会议 / 访谈',article:'&#128196; 文章 / 结构化笔记',research:'&#128269; 调研 / 工作内容'};
  el.innerHTML=`<div class="ph"><h2>Skills</h2><span class="sub">prompt templates</span><div class="acs">${isAdmin?`<button class="bt bp" onclick="newSkill()">+ 新建</button>`:''}</div></div>
    <p style="font-size:11px;color:var(--ink3);margin-bottom:10px;">任何非播客来源都可选择任意 Skill · 变量用 <code style="background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:3px;color:var(--p);">{{variable}}</code> 表示</p>
    ${Object.entries(grouped).map(([cat,sks])=>`
      <div class="skill-category-header">${labels[cat]||cat}</div>
      ${sks.map(s=>`<div class="skill-card">
        <h4>${s.name}</h4>
        <div class="skill-meta">${s.description||''}<br>变量：${(JSON.parse(s.variables||'[]')).map(v=>'{{'+v+'}}').join(' · ')}</div>
        <textarea id="sk-${s.id}" ${!isAdmin?'readonly':''}>${s.prompt_template}</textarea>
        ${isAdmin?`<div class="ma"><button class="bt bp bs" onclick="saveSkill(${s.id})">保存</button>${s.category!=='podcast'?`<button class="bt bou bs" onclick="delSkill(${s.id})">删除</button>`:''}</div>`:''}
      </div>`).join('')}
    `).join('')}`;
}
async function saveSkill(id){
  const ta=document.getElementById('sk-'+id);
  const s=skills.find(x=>x.id===id);
  await api('/skills/'+id,{method:'PUT',body:JSON.stringify({name:s.name,category:s.category,description:s.description,prompt_template:ta.value,variables:JSON.parse(s.variables||'[]')})});
  alert('已保存');await ld();
}
async function delSkill(id){if(!confirm('删除此 Skill？'))return;await api('/skills/'+id,{method:'DELETE'});await ld();}
function newSkill(){
  const cat=prompt('内容类型（transcript / article / research）','transcript');
  if(!cat)return;
  const name=prompt('Skill 名称','自定义提炼');
  if(!name)return;
  const desc=prompt('简短描述（可选）','');
  api('/skills',{method:'POST',body:JSON.stringify({name,category:cat,description:desc||null,prompt_template:'请对以下内容进行提炼：\n\n标题：{{title}}\n内容：\n{{content}}',variables:['title','content']})}).then(()=>ld());
}

// ========== KNOWLEDGE GRAPH ==========
const TAXONOMY={
  "底层原理":{icon:"🔬",color:"#6366F1",subs:{"数学与逻辑":{kw:["贝叶斯","概率","统计","博弈","纳什","奥卡姆","信息论","熵","马尔可夫","蒙特卡洛","梯度","凸优化","拉格朗日","傅里叶","线性代数","矩阵","向量"]},"物理与复杂系统":{kw:["热力学","混沌","复杂系统","涌现","相变","临界","耗散","反馈","控制论","熵增"]},"哲学与认知":{kw:["存在主义","荒诞","现象学","认知","启发式","偏见","范式","库恩","波普尔","证伪","第一性原理","演绎","归纳","还原论"]}}},
  "AI 基础理论":{icon:"🧠",color:"#8B5CF6",subs:{"模型架构":{kw:["架构","Transformer","注意力","attention","layer","MoE","encoder","decoder","神经网络","卷积","循环","扩散"]},"训练范式":{kw:["训练","学习","优化","强化学习","预训练","微调","fine-tune","reward","self-play","蒸馏","对齐","RLHF"]},"能力扩展":{kw:["scaling","扩展","涌现","AGI","通用智能","推理时","compute","多模态","上下文"]}}},
  "AI 工程":{icon:"⚙️",color:"#EF4444",subs:{"硬件与算力":{kw:["GPU","芯片","CUDA","Triton","TPU","算力","显存","FP8","FP16","量化","并行","集群"]},"系统与协议":{kw:["框架","部署","推理","协议","MCP","benchmark","pipeline","infra","基础设施","编译器"]}}},
  "AI 应用":{icon:"🤖",color:"#10B981",subs:{"智能体与自动化":{kw:["agent","智能体","自动化","工具调用","任务规划","执行","agentic","编排","workflow"]},"具身智能":{kw:["具身","机器人","视觉","感知","物理","world model","VLA","动作","遥操作","端到端"]}}},
  "商业与战略":{icon:"🚀",color:"#F59E0B",subs:{"商业模式":{kw:["商业","收入","ARR","飞轮","PMF","SaaS","订阅","变现","规模","网络效应","POD","供应链","柔性","DTC","毛利","客单价","LTV","CAC","复购"]},"竞争与资本":{kw:["护城河","壁垒","竞争","融资","估值","IPO","上市","风投","VC","红利","窗口期"]},"运营与增长":{kw:["ROI","NPS","SOP","转化率","留存","DAU","MAU","增长","漏斗","用户","运营","获客","私域","流量"]}}},
  "经济与金融":{icon:"📈",color:"#3B82F6",subs:{"经济学原理":{kw:["马太效应","长尾","供需","边际","博弈论","外部性","机会成本","沉没成本","规模经济","比较优势","通胀","利率","货币","财富效应","FOMO","羊群","锚定","禀赋效应","损失厌恶"]},"投资与交易":{kw:["期权","量化","对冲","交易","alpha","策略","收益","风险","套利","杠杆"]}}}
};

function isKnowledgeTerm(t){
  const def=t.def||'';
  if(def.includes('嘉宾定义')||def.includes('嘉宾/受访者定义')||def.includes('受访者定义'))return false;
  if(/^(SEED|萤火|Tilang|OpenRouter|豆包|TopLin|ImageNet|通讯作者|金刚经|道德经|连续思维|技术的自我|编辑|水线|意外值|脏活累活)/.test(t.name))return false;
  if(t.name.length<2||t.name.length>25)return false;
  if(/^(字节|阿里|腾讯|百度|幻方|DeepSeek|华为|北京大学|浙江大学).{0,5}(的|推出|团队|项目|发起)/.test(def))return false;
  const text=(t.name+' '+(t.eng||'')+' '+def).toLowerCase();
  for(const cat of Object.values(TAXONOMY)){for(const sub of Object.values(cat.subs)){if(sub.kw.some(k=>text.includes(k.toLowerCase())))return true;}}
  if(t.eng&&t.eng.length>2)return true;
  if(/概念|理论|效应|原理|定律|法则|模型|方法|术语|经济|心理|社会|哲学|数学/.test(def))return true;
  return false;
}

function classifyTerm(t){
  const text=(t.name+' '+(t.eng||'')+' '+(t.def||'')).toLowerCase();
  let bc='其他',bs='未分类',bsc=0;
  for(const[c,v]of Object.entries(TAXONOMY)){for(const[sub,sv]of Object.entries(v.subs)){let sc=0;sv.kw.forEach(k=>{if(text.includes(k.toLowerCase()))sc++;});if(sc>bsc){bsc=sc;bc=c;bs=sub;}}}
  return{cat:bc,sub:bs,score:bsc};
}

function rKG(el){
  const all=Object.values(termDB);
  const terms=all.filter(t=>{const e=kgEdits[t.name];if(e&&e.action==='delete')return false;return isKnowledgeTerm(t);}).map(t=>{
    const e=kgEdits[t.name];if(!e)return t;
    const c={...t};
    if(e.action==='rename'&&e.new_name)c.displayName=e.new_name;
    if(e.user_note)c.userNote=e.user_note;
    if(e.new_category)c.forceCategory=e.new_category;
    if(e.new_subcategory)c.forceSubcategory=e.new_subcategory;
    return c;
  });
  if(!terms.length){el.innerHTML='<div class="ph"><h2>Graph</h2></div><div class="emp"><div class="ic">&#128218;</div><h3>还没有概念</h3><p>提炼笔记后，术语会自动在这里汇聚</p></div>';return;}

  const tree={};const catList=Object.keys(TAXONOMY);
  terms.forEach(t=>{
    let cat,sub;
    if(t.forceCategory&&t.forceSubcategory){cat=t.forceCategory;sub=t.forceSubcategory;}
    else{const c=classifyTerm(t);cat=c.cat;sub=c.sub;}
    if(!tree[cat])tree[cat]={};
    if(!tree[cat][sub])tree[cat][sub]=[];
    tree[cat][sub].push(t);
  });

  let html=`<div class="ph"><h2>Graph</h2><span class="sub">${terms.length} concepts · ${E.filter(e=>e.status==='done').length+notes.filter(n=>n.status==='done').length} notes</span></div>`;
  const cats=[...catList,'其他'];
  cats.forEach(cat=>{
    if(!tree[cat])return;
    const info=TAXONOMY[cat]||{icon:'📎',color:'#888'};
    const subs=Object.entries(tree[cat]);
    const total=subs.reduce((s,x)=>s+x[1].length,0);
    html+=`<div style="margin-bottom:24px;">
      <div class="kg-cat-header" onclick="this.nextElementSibling.classList.toggle('kg-collapsed')" style="border-left-color:${info.color};">
        <span style="font-size:18px;">${info.icon}</span>
        <span style="font-size:15px;font-weight:600;flex:1;">${cat}</span>
        <span style="font-size:10px;color:var(--ink3);background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:10px;">${total}</span>
        <span style="font-size:11px;color:var(--ink4);">▼</span>
      </div>
      <div style="padding-left:18px;">`;
    subs.forEach(([sub,ts])=>{
      ts.sort((a,b)=>(b.episodes?.length||0)-(a.episodes?.length||0));
      html+=`<div style="margin-bottom:14px;">
        <div class="kg-sub-title" style="color:${info.color};">
          <span style="width:6px;height:6px;border-radius:50%;background:${info.color};"></span>${sub}
          <span style="font-size:9px;color:var(--ink3);font-weight:400;">(${ts.length})</span>
        </div>
        <div style="padding-left:14px;border-left:1px solid ${info.color}33;">`;
      ts.forEach(t=>{
        const dn=t.displayName||t.name;
        const tn=t.name.replace(/'/g,"\\'");
        const epLinks=(t.episodes||[]).map(e=>`<span onclick="openToTerm(${typeof e.id==='string'?`'${e.id}'`:e.id},'${tn}')" style="font-size:10px;color:var(--ink3);cursor:pointer;padding:3px 0;"><span class="pl">${e.podcast==='_散装收藏'?'散装':(e.podcast||'').substring(0,10)}</span> →</span>`).join(' ');
        const note=t.userNote?`<div style="font-size:10px;color:var(--p);margin:4px 0;padding:5px 10px;background:var(--pl);border-radius:5px;">&#128221; ${t.userNote}</div>`:'';
        html+=`<div class="kn">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:13px;font-weight:600;color:var(--ink);">${dn}</span>
            ${t.eng?`<span style="font-size:10px;color:var(--ink3);">${t.eng}</span>`:''}
            <span style="font-size:9px;color:var(--ink3);margin-left:auto;">${(t.episodes||[]).length}篇</span>
            ${isAdmin?`<button onclick="kgEdit('${tn}')" style="background:none;border:1px solid var(--line2);border-radius:4px;padding:1px 7px;font-size:9px;cursor:pointer;color:var(--ink3);">编辑</button><button onclick="kgDel('${tn}')" style="background:none;border:1px solid var(--line2);border-radius:4px;padding:1px 7px;font-size:9px;cursor:pointer;color:var(--rd);">✕</button>`:''}
          </div>
          ${note}
          <div style="font-size:12px;line-height:1.7;color:var(--ink2);margin-bottom:6px;">${(t.def||'').substring(0,150)}${(t.def||'').length>150?'...':''}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">${epLinks}</div>
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

// ========== CARDS ==========
function getSummary(notes){
  if(!notes)return '';
  const quotes=[...notes.matchAll(/[""\u201c]([^""\u201d]{15,80})[""\u201d]/g)].map(m=>m[1]);
  if(quotes.length>=2)return'\u201c'+quotes[0]+'\u201d \u201c'+quotes[1]+'\u201d';
  const match=notes.match(/核心命题[：:]*\s*(.{20,120})/);
  if(match)return match[1];
  const lines=notes.split('\n').filter(l=>l.trim().length>20&&!l.startsWith('#')&&!l.startsWith('-'));
  return lines[0]?.substring(0,120)||'';
}

function replaceNoteFile(id){
  const input=document.createElement('input');
  input.type='file';input.accept='.md,.txt,.markdown,.docx';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const text=await parseFileContent(file);
    if(text===null)return;
    await api(`/notes/${id}`,{method:'PATCH',body:JSON.stringify({raw_content:text,content:null,status:'new'})});
    await ld();await processNote(id);
  };
  input.click();
}
function pollNote(id){
  const k='n'+id;
  if(PT[k])return;
  PT[k]=setInterval(async()=>{
    try{
      const j=await api(`/notes/${id}/job`);
      if(j.step==='done'||j.step==='error'){clearInterval(PT[k]);delete PT[k];await ld();return;}
      const c=document.getElementById(`note-${id}`);
      if(c){const b=c.querySelector('.pf');const t=c.querySelector('.pt');if(b)b.style.width=j.progress+'%';if(t)t.innerHTML=`<span class="sp"></span>${j.message} (${j.progress}%)`;}
    }catch(e){clearInterval(PT[k]);delete PT[k];}
  },3000);
}

async function parseFileContent(file){
  const ext=file.name.split('.').pop().toLowerCase();
  try{
    if(ext==='md'||ext==='markdown'||ext==='txt'){return await file.text();}
    else if(ext==='docx'){
      const arrayBuffer=await file.arrayBuffer();
      // Use HTML output so tables/lists survive, then convert ourselves.
      const result=await mammoth.convertToHtml({arrayBuffer});
      return htmlToMd(result.value);
    }
    else{alert('不支持的格式');return null;}
  }catch(e){alert('解析失败：'+e.message);return null;}
}

// Lightweight HTML → Markdown: handles headings, paragraphs, bold/italic,
// lists, and tables (as GFM pipe tables). Strips noise.
function htmlToMd(html){
  const wrap=document.createElement('div');wrap.innerHTML=html;
  const out=[];
  function text(n){return (n.textContent||'').replace(/\s+/g,' ').trim();}
  function tableToMd(tbl){
    const rows=[...tbl.querySelectorAll('tr')].map(tr=>
      [...tr.querySelectorAll('th,td')].map(td=>text(td).replace(/\|/g,'\\|'))
    );
    if(!rows.length)return '';
    const cols=Math.max(...rows.map(r=>r.length));
    rows.forEach(r=>{while(r.length<cols)r.push('');});
    const lines=[];
    lines.push('| '+rows[0].join(' | ')+' |');
    lines.push('|'+' --- |'.repeat(cols));
    for(let i=1;i<rows.length;i++)lines.push('| '+rows[i].join(' | ')+' |');
    return lines.join('\n');
  }
  function walk(node,ctx){
    ctx=ctx||{};
    for(const n of node.childNodes){
      if(n.nodeType===3){out.push(n.textContent);continue;}
      if(n.nodeType!==1)continue;
      const t=n.tagName.toLowerCase();
      if(/^h[1-6]$/.test(t)){out.push('\n\n'+'#'.repeat(+t[1])+' ');walk(n,ctx);out.push('\n\n');}
      else if(t==='p'){walk(n,ctx);out.push('\n\n');}
      else if(t==='br'){out.push('  \n');}
      else if(t==='strong'||t==='b'){out.push('**');walk(n,ctx);out.push('**');}
      else if(t==='em'||t==='i'){out.push('*');walk(n,ctx);out.push('*');}
      else if(t==='code'){out.push('`');walk(n,ctx);out.push('`');}
      else if(t==='a'){out.push('[');walk(n,ctx);out.push('](' + (n.getAttribute('href')||'') + ')');}
      else if(t==='ul'){out.push('\n');walk(n,{...ctx,list:'ul'});out.push('\n');}
      else if(t==='ol'){out.push('\n');walk(n,{...ctx,list:'ol',idx:1});out.push('\n');}
      else if(t==='li'){
        out.push(ctx.list==='ol'?((ctx.idx++)+'. '):'- ');
        walk(n,{...ctx,list:null});
        out.push('\n');
      }
      else if(t==='blockquote'){out.push('\n> ');walk(n,ctx);out.push('\n\n');}
      else if(t==='hr'){out.push('\n---\n');}
      else if(t==='table'){out.push('\n\n'+tableToMd(n)+'\n\n');}
      else if(t==='img'){out.push('![]('+ (n.getAttribute('src')||'')+')');}
      else{walk(n,ctx);}
    }
  }
  walk(wrap);
  return out.join('')
    .replace(/\\([-.\_\[\]()#+!*<>])/g,'$1')  // unescape mammoth
    .replace(/[ \t]+\n/g,'\n')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function cleanMammothEscapes(s){return (s||'').replace(/\\([-.\_\[\]()#+!*<>])/g,'$1');}

// ========== SOURCE DRAWER ==========
function openSrc(type){
  window._openSrc=type;
  const titles={podcast:'播客订阅',lark:'飞书文档',note:'上传笔记'};
  document.getElementById('sdt').textContent=titles[type]||'来源';
  renderSrc(type);
  document.getElementById('sdrw').classList.add('open');
  document.getElementById('sdov').classList.add('open');
}
function closeSrc(){window._openSrc=null;document.getElementById('sdrw').classList.remove('open');document.getElementById('sdov').classList.remove('open');}

function renderSrc(type){
  const b=document.getElementById('sdb');
  if(!isAdmin){b.innerHTML='<div class="emp"><div class="ic">&#128274;</div><h3>需要登录</h3><p style="margin-top:8px;"><button class="bt bp" onclick="showLoginModal()">登录</button></p></div>';return;}
  if(type==='podcast')b.innerHTML=renderPodcastSrc();
  else if(type==='lark')b.innerHTML=renderLarkSrc();
  else if(type==='note')b.innerHTML=renderNoteSrc();
}

function renderPodcastSrc(){
  const subs=P.filter(p=>p.name!=='_散装收藏');
  const pend=E.filter(e=>e.status==='new'||e.status==='processing');
  return`
    <div class="src-section">
      <h4>我的订阅 · ${subs.length}</h4>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${subs.map(p=>`<div class="sub-chip">
          ${p.artwork?`<img src="${p.artwork}">`:'<span style="width:24px;text-align:center;">🎙</span>'}
          ${p.name}${p.new_count>0?` <span class="nbadge">${p.new_count}</span>`:''}
          <button class="x" onclick="dp(${p.id},'${p.name.replace(/'/g,"\\'")}')">✕</button>
        </div>`).join('')}
      </div>
    </div>
    <div class="src-section">
      <h4>添加新订阅</h4>
      <input class="src-input" id="ps" placeholder="搜索播客名称..." oninput="ds()">
      <div class="srs" id="sr"></div>
      <div style="display:flex;gap:8px;margin-top:14px;align-items:center;">
        <button class="bt bou" style="flex:1;" onclick="addManual()">&#9997; 手动填写</button>
        <button class="bt bou" style="flex:1;" onclick="addOneoff()">&#128279; 喂入单集</button>
      </div>
    </div>
    <div class="src-section">
      <h4>
        <span>&#9889; 处理中 · ${pend.length}</span>
        <button class="bt bou bs" style="float:right;margin-top:-4px;" onclick="doRefresh(this)">&#8635; 刷新 RSS</button>
      </h4>
      <div class="el">${pend.length?pend.map(rc).join(''):'<div class="sl">暂无待处理剧集</div>'}</div>
    </div>`;
}

function renderLarkSrc(){
  const nonPod=skills.filter(s=>s.category!=='podcast');
  return`
    <div class="src-section">
      <h4>搜索飞书文档</h4>
      <input class="src-input" id="lark-q" placeholder="输入关键词..." oninput="dsLark()">
      <div class="srs" id="lark-sr"></div>
    </div>
    <div class="src-section">
      <h4>选择提炼 Skill</h4>
      <select class="src-input" id="lark-skill" onchange="document.getElementById('lark-skill-desc').textContent=(skills.find(s=>s.id===parseInt(this.value))||{}).description||''">
        ${nonPod.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
      </select>
      <div id="lark-skill-desc" style="font-size:10px;color:var(--ink3);margin-top:6px;">${nonPod[0]?.description||''}</div>

      <button class="bt bp" style="width:100%;padding:13px;font-size:13px;" id="lark-btn" onclick="addLark()" disabled>先选择文档</button>

}

function renderNoteSrc(){
  const nonPod=skills.filter(s=>s.category!=='podcast');
  return`
    <div class="src-section">
      <h4>上传文件（可选）</h4>
      <input type="file" id="note-file" accept=".md,.txt,.markdown,.docx" onchange="handleNoteFile(event)" class="src-input" style="padding:10px;">

// Podcast search in drawer
function ds(){clearTimeout(_sT);_sT=setTimeout(ss,400);}
async function ss(){
  const q=document.getElementById('ps').value.trim();const el=document.getElementById('sr');
  if(!q){el.innerHTML='';return;}
  el.innerHTML='<div class="sl">搜索中...</div>';
  const r=await api(`/search?q=${encodeURIComponent(q)}`);
  if(!r.length){el.innerHTML='<div class="sl">未找到</div>';return;}
  el.innerHTML=r.map((x,i)=>`<div class="si" onclick="pss(${i})">${x.artwork?`<img src="${x.artwork}">`:'<div class="iph">🎙</div>'}<div><div class="sn">${x.name}</div><div class="sa">${x.artist||''} · ${x.episode_count||'?'} 集</div></div></div>`).join('');
  window._sr=r;
}
async function pss(i){
  const r=window._sr[i];if(!r)return;
  await api('/podcasts',{method:'POST',body:JSON.stringify({name:r.name,rss_url:r.rss_url||null,artwork:r.artwork||null})});
  await ld();
}
function addManual(){
  const n=prompt('播客名称');if(!n)return;
  const u=prompt('RSS 链接（可选）','');
  api('/podcasts',{method:'POST',body:JSON.stringify({name:n,rss_url:u||null})}).then(()=>ld());
}
function addOneoff(){
  const t=prompt('单集标题');if(!t)return;
  const l=prompt('链接（可选）','');
  api('/episodes/oneoff',{method:'POST',body:JSON.stringify({title:t,link:l||null,description:null})}).then(()=>ld());
}
async function dp(id,nm){if(!confirm(`取消订阅「${nm}」？`))return;await api(`/podcasts/${id}`,{method:'DELETE'});if(CF===id)CF=null;await ld();}
async function doRefresh(b){b.disabled=true;b.textContent='...';const r=await api('/refresh',{method:'POST'});b.disabled=false;b.innerHTML='&#8635; 刷新 RSS';await ld();if(r.new_episodes>0)alert(`发现 ${r.new_episodes} 个新剧集！`);}

// Lark drawer
function dsLark(){clearTimeout(_larkTimer);_larkTimer=setTimeout(doLarkSearch,500);}
async function doLarkSearch(){
  const q=document.getElementById('lark-q').value.trim();
  const el=document.getElementById('lark-sr');
  if(!q){el.innerHTML='';return;}
  el.innerHTML='<div class="sl">搜索中...</div>';
  try{
    const r=await api(`/lark/search?q=${encodeURIComponent(q)}`);
    if(!r.length){el.innerHTML='<div class="sl">未找到</div>';return;}
    el.innerHTML=r.map((d,i)=>`<div class="si" id="lsi-${i}" onclick="selLark(${i})"><div class="iph">📄</div><div><div class="sn">${d.title}</div><div class="sa">${d.type} · ${d.token.substring(0,18)}...</div></div></div>`).join('');
    window._larkSr=r;
  }catch(e){el.innerHTML='<div class="sl">搜索失败，请确认 lark-cli 已授权</div>';}
}
function selLark(i){
  _selectedLark=window._larkSr[i];
  document.querySelectorAll('#lark-sr .si').forEach((el,j)=>el.classList.toggle('sel',j===i));
  const btn=document.getElementById('lark-btn');
  btn.disabled=false;btn.innerHTML='&#9889; 添加并提炼';
}
async function addLark(){
  if(!_selectedLark)return;
  const skillId=parseInt(document.getElementById('lark-skill').value)||null;
  const selected=_selectedLark;_selectedLark=null;
  closeSrc();
  const r=await api('/notes',{method:'POST',body:JSON.stringify({
    source_type:'lark',source_ref:selected.token,title:selected.title,skill_id:skillId,
    metadata:{lark_token:selected.token,lark_type:selected.type,lark_url:selected.url||''}
  })});
  await ld();
  if(r&&r.id){await processNote(r.id);}
}

// Note drawer
async function handleNoteFile(event){
  const file=event.target.files[0];if(!file)return;
  const base=file.name.replace(/\.[^.]+$/,'');
  const titleInput=document.getElementById('note-title');
  if(!titleInput.value.trim())titleInput.value=base;
  const text=await parseFileContent(file);
  if(text!==null)document.getElementById('note-content').value=text;
}
async function addNote(){
  const title=document.getElementById('note-title').value.trim();
  const content=document.getElementById('note-content').value.trim();
  const skillId=parseInt(document.getElementById('note-skill').value)||null;
  if(!title||!content){alert('标题和内容不能为空');return;}
  closeSrc();
  const r=await api('/notes',{method:'POST',body:JSON.stringify({
    source_type:'note',title,raw_content:content,skill_id:skillId,metadata:{}
  })});
  await ld();
  if(r&&r.id){await processNote(r.id);}
}

function sm(id){document.getElementById(id).classList.add('vis');}
function hm(id){document.getElementById(id).classList.remove('vis');}

ld();setInterval(ld,300000);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){cd();closeSrc();hidePop();document.querySelectorAll('.mb.vis').forEach(m=>m.classList.remove('vis'));}});
</script>
